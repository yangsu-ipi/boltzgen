path: gontivimab.cif
include: 
  - chain: 
      id: A
design:
  - chain:
      id: A
      res_index: 26..32,52..57,100..116

structure_groups:
  - group:
      id: A
      visibility: 2
  - group:
      id: A
      visibility: 0
      res_index: 1,2,26..32,52..57,100..116

exclude: 
    - chain:
        id: A
        res_index: 26..28,52..53,100..100 # take out 3

design_insertions:
  - insertion:
      id: A
      res_index: 26 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 1..5
  - insertion:
      id: A
      res_index: 52 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 1..5
  - insertion:
      id: A
      res_index: 100 # The res_index'th residue will be a designed one (starting to count from 1)
      num_residues: 1..12

# reindex the residue index which is used in the positional encoding
reset_res_index:
  - chain:
      id: A